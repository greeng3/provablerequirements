text: |
  Prebuilt executables are provided for the supported platform matrix: Linux, macOS,
  and Windows, each on x86_64 and aarch64 (arm64) — six targets. The set of supported
  platforms is explicit and finite, chosen deliberately, not auto-discovered from the
  operator's environment.
