text: |
  Resuming a draft re-checks the source revision token against the live
  requirement item. If the item moved underneath the draft (the tokens differ),
  the draft is flagged stale for human re-confirmation before formalization
  continues, so the engine never runs off a draft written against a since-changed
  requirement. Editing the candidate re-baselines the draft against the item's
  current revision, clearing the stale flag.
