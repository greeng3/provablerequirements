text: |
  The `init` command discovers a subject repository's Doorstop layout from the
  subject's own Doorstop configuration — the document roots, their item prefix,
  and the item identifiers — without hardcoding anything specific to any one
  repository. Discovery does not follow symlinks out of the subject tree.
