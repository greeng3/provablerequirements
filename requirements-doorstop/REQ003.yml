text: |
  Release builds are published to a location the operator (and the provisioner itself)
  can fetch executables from without authentication (GitHub Releases). Each release
  includes a machine-readable manifest describing the available artifacts (target
  triple, filename, checksum) so the correct asset can be selected per platform.
