name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Frontend first: `cargo` embeds web/dist via rust-embed, so the real UI
      # must be built on disk before the Rust build/tests run.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend deps
        run: npm --prefix web ci
      - name: Frontend tests
        run: npm --prefix web test
      - name: Build frontend
        run: npm --prefix web run build

      - name: Add rust components
        run: rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all

      # Dependency CVE scan (RustSec). Mirrors `make audit`; kept fast by
      # installing a prebuilt cargo-audit rather than compiling it.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

  # The real-engine path, on its own job (REQ027). The main `test` job stays Kani-FREE by
  # design: the common user state is engine-absent (R-eng-2), and that path — provreq staying
  # honest when no verifier is installed — is the one most worth proving on every push. The
  # real-engine tests are `#[ignore]`d, so `test` never pays Kani's cost; this job installs
  # Kani and runs exactly those. It does not gate the fast job — a Kani regression is real,
  # but it must not block a change that never touched the engine.
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # `cargo test` links the whole crate (axum, rust-embed), which embeds web/dist — so the
      # frontend must exist on disk even though these tests never touch it.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: npm --prefix web ci && npm --prefix web run build
      # Installs the driver and runs `cargo kani setup` (CBMC + solvers) — the same two steps
      # the devcontainer bakes into its image.
      - name: Install Kani
        uses: model-checking/kani-github-action@v1
      # Scoped to the kani module: this job installs Kani but not TLC, so it must not run the
      # cat-2a real-engine tests (that is the `tlc` job's). Each engine's real path is proven
      # by the job that has that engine.
      - name: Run the real-engine tests
        run: "cargo test --lib kani:: -- --ignored"

  # The category-1 DEDUCTIVE real-engine path (REQ031), on its own job — same design as `kani`
  # above: the main `test` job stays engine-FREE, and this job runs exactly the `#[ignore]`d
  # `creusot::` real-engine tests. Creusot is far too heavy to build from scratch on a runner
  # (opam + Why3 + a rustc-driver source build), so — following the repo's "everything is baked
  # into the image" convention — this job runs INSIDE the prebuilt devcontainer image, where
  # cargo-creusot, Why3, and the provers already live. ubuntu-latest is amd64, so it pulls the
  # image's amd64 variant; the provers provreq supplies (alt-ergo/z3/cvc5) are present on both
  # arches.
  #
  # A job running in a `container:` inherits the image's baked PATH, so cargo-creusot/why3/provers
  # are found. But GHA sets HOME=/github/home for container jobs, while the image's rustup default
  # toolchain and cargo caches live under /root — so without pointing RUSTUP_HOME/CARGO_HOME back,
  # `cargo` (which cargo-creusot shells out to) reports "no default toolchain configured". Setting
  # them restores the running-container env the tests were verified against.
  creusot:
    runs-on: ubuntu-latest
    container: ghcr.io/greeng3/provreq-devcontainer:latest
    env:
      RUSTUP_HOME: /root/.rustup
      CARGO_HOME: /root/.cargo
    steps:
      - uses: actions/checkout@v5
      # Confirm the baked engine is reachable before spending time on the frontend build — a
      # first-run PATH/toolchain problem shows up here, not 3 minutes later in an opaque error.
      - name: Show the baked Creusot toolchain
        run: cargo-creusot --version; command -v cargo-creusot why3 z3 alt-ergo cvc5
      # `cargo test` links the whole crate (axum, rust-embed), which embeds web/dist — so the
      # frontend must exist on disk even though these tests never touch it. Node is a
      # devcontainer FEATURE, not part of the raw image, so set it up here.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: npm --prefix web ci && npm --prefix web run build
      # Scoped to the creusot module: this job has Creusot but drives only its real-engine
      # tests. Each engine's real path is proven by the job that has that engine.
      - name: Run the real-engine tests
        run: "cargo test --lib creusot:: -- --ignored"

  # The category-2a real-engine path (REQ029), on its own job — same design as `kani` above:
  # the main `test` job stays engine-FREE, and this job installs TLC and runs exactly the
  # `#[ignore]`d cat-2a tests. TLC is a JRE + a jar (far lighter than Kani/CBMC), so this job is
  # quick; a public repo pays nothing for the extra minutes.
  tlc:
    runs-on: ubuntu-latest
    env:
      TLA2TOOLS_JAR: ${{ github.workspace }}/tla2tools.jar
    steps:
      - uses: actions/checkout@v5
      # `cargo test` links the whole crate (axum, rust-embed), which embeds web/dist — so the
      # frontend must exist on disk even though these tests never touch it.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: npm --prefix web ci && npm --prefix web run build
      # A headless JRE plus the tla2tools jar — the same two pieces the devcontainer bakes in.
      - name: Install TLC (JRE + tla2tools.jar)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends default-jre-headless
          curl -fLsS -o "$TLA2TOOLS_JAR" \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar
          java -cp "$TLA2TOOLS_JAR" tlc2.TLC 2>&1 | grep -q "TLC2 Version"
      - name: Run the real-engine tests
        run: "cargo test --lib tlc:: -- --ignored"
