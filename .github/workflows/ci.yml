name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add rust components
        run: rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
