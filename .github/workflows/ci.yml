name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend first: `cargo` embeds web/dist via rust-embed, so the real UI
      # must be built on disk before the Rust build/tests run.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend deps
        run: npm --prefix web ci
      - name: Frontend tests
        run: npm --prefix web test
      - name: Build frontend
        run: npm --prefix web run build

      - name: Add rust components
        run: rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all

      # Dependency CVE scan (RustSec). Mirrors `make audit`; kept fast by
      # installing a prebuilt cargo-audit rather than compiling it.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit
